<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Autism Detection</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="/static/assets/images/favicon.ico">

    <!-- External CSS Libraries -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/assets/css/core/libs.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/aos/dist/aos.css">
    <link rel="stylesheet" href="/static/assets/css/hope-ui.min.css?v=4.0.0">
    <link rel="stylesheet" href="/static/assets/css/custom.min.css?v=4.0.0">
    <link rel="stylesheet" href="/static/assets/css/dark.min.css">
    <link rel="stylesheet" href="/static/assets/css/customizer.min.css">
    <link rel="stylesheet" href="/static/assets/css/rtl.min.css">
</head>

<body style="background: #0f172a;">

<!-- Loader -->
<div id="loading">
    <div class="loader simple-loader">
        <div class="loader-body"></div>
    </div>
</div>

<br><br><br>

<div class="row">
    <div class="col-sm-4 mx-auto">
        <div class="card shadow-sm">

            <div class="card-header text-center">
                <h4 class="card-title mb-0">Password Updation</h4>
            </div>

            <div class="card-body">

                <form method="post" action="/myapp/changepassword/">
                    {% csrf_token %}

                    <div class="form-group mb-3">
                        <label class="form-label" for="currentPassword">Current Password</label>
                        <input type="password" class="form-control" name="cpassword" id="currentPassword" placeholder="Enter Current Password" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label" for="newPassword">New Password</label>
                        <input type="password" class="form-control" name="npassword" id="newPassword" placeholder="Enter New Password" required>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label" for="confirmPassword">Confirm Password</label>
                        <input type="password" class="form-control" name="reepassword" id="confirmPassword" placeholder="Confirm New Password" required>
                    </div>

                   <div class="d-flex gap-0">
    <button type="submit" class="btn btn-primary">Submit</button>
    <a href="/myapp/adminhome/" class="btn btn-outline-primary ms-1">Home</a>
    <button type="reset" class="btn btn-danger ms-1">Cancel</button>
</div>

                </form>

                {% if messages %}
                <div class="mt-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="/static/assets/js/core/libs.min.js"></script>
<script src="/static/assets/js/core/external.min.js"></script>
<script src="/static/assets/js/charts/widgetcharts.js"></script>
<script src="/static/assets/js/charts/vectore-chart.js"></script>
<script src="/static/assets/js/charts/dashboard.js"></script>
<script src="/static/assets/js/plugins/fslightbox.js"></script>
<script src="/static/assets/js/plugins/setting.js"></script>
<script src="/static/assets/js/plugins/slider-tabs.js"></script>
<script src="/static/assets/js/plugins/form-wizard.js"></script>
<script src="/static/assets/vendor/aos/dist/aos.js"></script>
<script src="/static/assets/js/hope-ui.js" defer></script>

</body>
</html>
