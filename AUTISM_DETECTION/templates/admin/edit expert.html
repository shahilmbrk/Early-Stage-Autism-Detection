<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.css" />

  <style>
    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
    }

    .main {
      padding: 30px;
    }

    .card {
      max-width: 600px;
      margin: 20px auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      background-color: #fff;
      transition: transform 0.3s ease-in-out;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card h3 {
      font-weight: bold;
      color: #0f0f0f;
    }

    .form-label {
      font-weight: 600;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn-primary {
      background-color: #0f0f0f;
      border: none;
    }

    .btn-primary:hover {
      background-color: #0f0f0f;
    }

    .btn-secondary {
      background-color: #6c757d;
      border: none;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
    }

    /* Map Styling */
    #map {
      height: 300px;
      width: 100%;
      border-radius: 8px;
      margin-top: 5px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body style="background: #0f172a;">

<!-- Main Content -->
<div class="main">
  <div class="card">
    <h3 class="text-center mb-4"><i class="bi bi-police"></i> Update Expert</h3>

    <form action="/myapp/editexpert_post/" method="POST" enctype="multipart/form-data" novalidate>
        {% csrf_token %}

        <input type="hidden" name="id" value="{{ data.id }}">

      <!-- Full Name -->
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ data.name }}"
          required pattern="[A-Za-z\s]{3,50}" placeholder="Enter full name">
        <div class="form-text">Only letters allowed. Min 3 characters.</div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control form-control-lg" id="email" name="email" value="{{ data.email }}"
          required placeholder="example@email.com">
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control form-control-lg" id="phone" name="phone"  value="{{ data.phone }}"
          required pattern="[6-9][0-9]{9}" placeholder="10-digit Indian number">
        <div class="form-text">Starts with 6/7/8/9 and contains 10 digits.</div>
      </div>

      <!-- Place -->
      <div class="mb-3">
        <label for="place" class="form-label">Place</label>
        <input type="text" class="form-control form-control-lg" id="place" name="place" value="{{ data.place }}"
          required placeholder="Enter place">
      </div>



      <!-- District -->
      <div class="mb-3">
        <label for="district" class="form-label">District</label>
        <input type="text" class="form-control form-control-lg" id="district" name="district" value="{{ data.district }}"
          required placeholder="Enter district">
      </div>

     <!-- Qualification -->
      <div class="mb-3">
        <label for="district" class="form-label">Qualification</label>
        <input type="text" class="form-control form-control-lg" id="district" name="qualification" value="{{ data.qualification }}"
          required placeholder="Enter qualification">
      </div>



         <div class="mb-3">
        <label for="district" class="form-label">Photo</label>
             <img src="/media/{{ data.photo }}" height="100" width="100">
        <input type="file" class="form-control form-control-lg" id="district" name="photo">
      </div>


      <!-- Buttons -->
      <div class="d-flex justify-content-between mt-4">
{#        <button type="reset" class="btn btn-secondary"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>#}
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Details</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.umd.js"></script>

</body>
</html>
