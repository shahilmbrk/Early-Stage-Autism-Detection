<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Question</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <div class="container mt-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="bi bi-question-circle"></i> Add Question</h4>
        </div>
        <div class="card-body">
          <form action="/myapp/addquestion_post/" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
              <input type="hidden" name="tid" value="{{ id }}">

            <!-- Question -->
            <div class="mb-3">
              <label class="form-label">Question</label>
              <textarea class="form-control" name="question" rows="3" maxlength="500" required placeholder="Enter Question"></textarea>
              <div class="form-text">Maximum 500 characters allowed.</div>
            </div>

            <!-- Answer -->
            <div class="mb-3">
              <label class="form-label">Answer</label>
              <textarea class="form-control" name="answer" rows="3" maxlength="500" required placeholder="Enter Answer"></textarea>
              <div class="form-text">Maximum 500 characters allowed.</div>
            </div>

            <!-- Type -->
            <div class="mb-3">
              <label class="form-label">Type</label>
              <input type="text" class="form-control" name="type" required placeholder="Enter type">
            </div>

               <div class="mb-3">
              <label class="form-label">Start Time</label>
              <input type="text" class="form-control" name="stime" required placeholder="Enter Start Time">
            </div>

               <div class="mb-3">
              <label class="form-label">End Time</label>
              <input type="text" class="form-control" name="etime" required placeholder="Enter End Time">
            </div>

            <!-- File Upload -->
            <div class="mb-3">
              <label class="form-label">Upload File</label>
              <input type="file" class="form-control" name="file">
              <div class="form-text">Optional: attach an image, PDF, or document.</div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
              <button type="reset" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
              <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Save Question
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
