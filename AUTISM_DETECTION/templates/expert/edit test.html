<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Test</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <div class="container mt-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Edit Test</h4>
        </div>
        <div class="card-body">
          <form action="/myapp/edittest_post/" method="POST">
              {% csrf_token %}

            <!-- Title -->
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" name="title" required
                     pattern="[A-Za-z0-9\s]{3,100}" placeholder="Enter Test Title" value="{{ data.title }}">
            </div>

            <!-- Level -->
            <div class="mb-3">
              <label class="form-label">Level</label>
              <select class="form-select" name="level" required>
                <option hidden>{{ data.level }}</option>
                <option value="EASY">EASY</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HARD">HARD</option>
              </select>
            </div>

            <!-- Details -->
            <div class="mb-3">
              <label class="form-label">Details</label>
              <textarea class="form-control" name="details" rows="4" maxlength="500"
                        required placeholder="Enter Test Details">{{ data.details }}</textarea>
              <div class="form-text">Maximum 500 characters allowed.</div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
              <button type="reset" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
              <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Update
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
