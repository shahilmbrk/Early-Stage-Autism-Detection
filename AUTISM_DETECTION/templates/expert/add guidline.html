<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Guideline</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white d-flex align-items-center">
          <i class="bi bi-journal-text me-2"></i>
          <h4 class="mb-0">Add Guideline</h4>
        </div>

        <div class="card-body">
          <form action="/myapp/addguidline_post/" method="POST" novalidate>
              <input type="hidden" name="tid" value="{{ id }}">
            {% csrf_token %}

            <!-- Guideline Title -->
            <div class="mb-3">
              <label for="title" class="form-label">Guideline Title</label>
              <input
                id="title"
                name="title"
                type="text"
                class="form-control"
                placeholder="Enter guideline title"
                required
                pattern="[A-Za-z0-9\s\-\,\.\:]{3,150}"
                maxlength="150"
              />
              <div class="form-text">3–150 characters; letters, numbers and basic punctuation allowed.</div>
            </div>

            <!-- Guideline Details -->
            <div class="mb-3">
              <label for="details" class="form-label">Guideline Details</label>
              <textarea
                id="details"
                name="details"
                class="form-control"
                rows="6"
                maxlength="2000"
                placeholder="Describe the guideline in detail..."
                required
              ></textarea>
              <div class="form-text">Maximum 2000 characters. Use clear, actionable language.</div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
              <button type="reset" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
              <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Save Guideline
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
