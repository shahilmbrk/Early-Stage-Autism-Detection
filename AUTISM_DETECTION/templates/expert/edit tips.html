<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Tips</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  </head>
  <body class="bg-light">

    <div class="container mt-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="bi bi-lightbulb"></i> Add Tips</h4>
        </div>
        <div class="card-body">
          <form action="/myapp/edittips_post/" method="POST">
              {% csrf_token %}

            <!-- Tips -->
            <div class="mb-3">
              <label class="form-label">Tips</label>
              <input type="text" class="form-control" name="tips" required
                     pattern="[A-Za-z\s]{3,100}" placeholder="Enter Tips" value="{{ data.tips }}">
            </div>

            <!-- Details -->
            <div class="mb-3">
              <label class="form-label">Details</label>
              <textarea class="form-control" name="details" rows="4" maxlength="500"
                        required placeholder="Enter Details">{{ data.details }}</textarea>
              <div class="form-text">Maximum 500 characters allowed.</div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
              <button type="reset" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Save
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  </body>
</html>
