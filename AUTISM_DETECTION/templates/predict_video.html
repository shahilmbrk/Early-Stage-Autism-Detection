<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .file-input {
            margin-bottom: 25px;
            text-align: left;
        }

        .file-input label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        .file-input input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            cursor: pointer;
        }

        .file-input input[type="file"]:hover {
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .note {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body style="background: #0f172a;">

<div class="card">
    <h2>Upload Video for Prediction</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="file-input">
            <label>Select Video File</label>
            <input type="file" name="video" accept="video/*" required>
        </div>

        <button type="submit" class="btn">Predict</button>
    </form>

    <p class="note">Supported formats: MP4, AVI, MOV</p>
</div>

</body>
</html>
