

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feedback - Review & Rating</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .feedback-card {
  background: #fff;
  margin: 0 auto; /* ✅ Centers the card horizontally */
  padding: 25px 30px;
  border-radius: 12px;
  max-width: 800px; /* ✅ Limit maximum width */
  width: 100%; /* ✅ Keep responsive */
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}


    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
      color: #444;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 15px;
      outline: none;
      resize: vertical;
    }

    textarea:focus {
      border-color: #007bff;
    }

    * {
      margin: 0;
      padding: 0;
    }

    .rate {
      float: left;
      height: 46px;
      padding: 0 10px;
    }

    .rate:not(:checked) > input {
      position: absolute;
      top: -9999px;
    }

    .rate:not(:checked) > label {
      float: right;
      width: 1em;
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
      font-size: 30px;
      color: #ccc;
    }

    .rate:not(:checked) > label:before {
      content: '★ ';
    }

    .rate > input:checked ~ label {
      color: #ffc700;
    }

    .rate:not(:checked) > label:hover,
    .rate:not(:checked) > label:hover ~ label {
      color: #deb217;
    }

    .rate > input:checked + label:hover,
    .rate > input:checked + label:hover ~ label,
    .rate > input:checked ~ label:hover,
    .rate > input:checked ~ label:hover ~ label,
    .rate > label:hover ~ input:checked ~ label {
      color: #c59b08;
    }

    .submit-btn {
      background: #007bff;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: #0056b3;
    }

    .error-msg {
      color: red;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body style="background: #0f172a;">
  <form action="/myapp/send_feedback/" method="post" id="feedbackForm">
    {% csrf_token %}
    <div class="feedback-card">
      <h2>Give Your Feedback</h2>

      <label for="feedback">Your Review</label>
      <textarea id="feedback" placeholder="Type your feedback here..." name="feedback" required></textarea>

      <label style="margin-top:15px;">Your Rating</label>
      <div class="rate">
        <input type="radio" name="rating" id="star5" value="5">
        <label for="star5"></label>
        <input type="radio" name="rating" id="star4" value="4">
        <label for="star4"></label>
        <input type="radio" name="rating" id="star3" value="3">
        <label for="star3"></label>
        <input type="radio" name="rating" id="star2" value="2">
        <label for="star2"></label>
        <input type="radio" name="rating" id="star1" value="1">
        <label for="star1"></label>
      </div>
      <p class="error-msg" id="ratingError">Please select a rating before submitting.</p>

      <button type="submit" class="submit-btn">Submit</button>
    </div>
  </form>

  <script>
    document.getElementById("feedbackForm").addEventListener("submit", function(event) {
      const ratingSelected = document.querySelector('input[name="rating"]:checked');
      const errorMsg = document.getElementById("ratingError");

      if (!ratingSelected) {
        event.preventDefault();
        errorMsg.style.display = "block";
      } else {
        errorMsg.style.display = "none";
      }
    });
  </script>
</body>
</html>
