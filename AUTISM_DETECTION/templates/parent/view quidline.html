<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Autism Detection — Guideline Data</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="/static/assets/images/favicon.ico">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- jQuery & DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- Hope UI -->
    <link rel="stylesheet" href="/static/assets/css/core/libs.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/aos/dist/aos.css">
    <link rel="stylesheet" href="/static/assets/css/hope-ui.min.css?v=4.0.0">
    <link rel="stylesheet" href="/static/assets/css/custom.min.css?v=4.0.0">
    <link rel="stylesheet" href="/static/assets/css/dark.min.css">
</head>

<style>
    .card {
        border-radius: 12px !important;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
    }
    .table th {
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .badge-date {
        background: #4b63ff;
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
    }
</style>

<body>

<!-- Loader -->
<div id="loading">
    <div class="loader simple-loader">
        <div class="loader-body"></div>
    </div>
</div>
<!-- Loader END -->

<br><br><br>

<main class="main-content">
    <div class="position-relative iq-banner"></div>

    <div class="container-fluid content-inner mt-n5 py-0">
        <div class="row justify-content-center">
            <div class="col-lg-12">

                <div class="card">

                    <!-- Header -->
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div class="header-title">
                            <h4 class="card-title mb-0">
                                <i class="fa-solid fa-list-check text-primary me-2"></i>
                               View Guideline Data
                            </h4>
                        </div>

                        <a href="/myapp/parenthome/" class="btn btn-outline-primary">
                            <i class="fa-solid fa-house"></i> Home
                        </a>
                    </div>

                    <div class="card-body">

                        <!-- Flash Messages -->
                        {% if messages %}
                        <div class="my-2">
                            {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}

                        <!-- Table -->
                        <div class="table-responsive mt-3">
                            <table id="example" class="table table-striped table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Sl No</th>
                                        <th>Date</th>
                                        <th>Details</th>
{#                                        <th>Action</th>#}
                                    </tr>
                                </thead>

                                <tbody>
                                    {% for i in data %}
                                    <tr>
                                        <td>{{ forloop.counter }}</td>

                                        <td>
                                            <span class="badge-date">{{ i.date }}</span>
                                        </td>

                                        <td>{{ i.details }}</td>

{#                                        <td>#}
{#                                            <a href="/myapp/deleteguidline/{{ i.id }}"#}
{#                                               class="btn btn-sm btn-outline-danger"#}
{#                                               onclick="return confirm('Are you sure you want to delete this guideline?');">#}
{#                                                <i class="fa-solid fa-trash"></i>#}
{#                                            </a>#}
{#                                        </td>#}
                                    </tr>
                                    {% endfor %}
                                </tbody>

                            </table>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-body d-flex justify-content-between">
            <ul class="list-inline mb-0">
                <li class="list-inline-item"><a href="#">Privacy Policy</a></li>
                <li class="list-inline-item"><a href="#">Terms</a></li>
            </ul>
            <div>© <script>document.write(new Date().getFullYear())</script> Hope UI</div>
        </div>
    </footer>

</main>

<!-- Scripts -->
<script src="/static/assets/js/core/libs.min.js"></script>
<script src="/static/assets/js/core/external.min.js"></script>
<script src="/static/assets/js/hope-ui.js" defer></script>

<script>
    $(document).ready(function () {
        $('#example').DataTable({
            "pageLength": 5,
            "lengthMenu": [5, 10, 20, 50],
            "ordering": true
        });
    });
</script>

</body>
</html>
